<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Shared Schedule</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    :root{
      --bg:#0b0b10;
      --card:#12121a;
      --card2:#161622;
      --text:#f4f4ff;
      --muted:#a7a7c2;
      --border:#242436;
      --pink:#ff2d86;
      --pink2:#ff66b0;
      --good:#19c37d;
      --bad:#ff4d4d;
      --shadow:0 10px 30px rgba(0,0,0,.35);

      --c1:#ff2d86;
      --c2:#a855f7;
      --c3:#22c55e;
      --c4:#38bdf8;
      --c5:#f97316;
      --c6:#facc15;
    }

    *{ box-sizing:border-box; }
    body{
      margin:0;
      padding:16px 16px 92px;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
      background: radial-gradient(1200px 800px at 40% -10%, rgba(255,45,134,.22), transparent 60%),
                  radial-gradient(900px 600px at 110% 10%, rgba(168,85,247,.18), transparent 60%),
                  var(--bg);
      color:var(--text);
    }

    .topbar{
      display:flex; align-items:center; justify-content:space-between;
      gap:10px; margin-bottom:12px;
    }
    .brand{ font-weight:900; letter-spacing:.2px; display:flex; align-items:center; gap:10px; }
    .dot{ width:9px; height:9px; border-radius:999px; background:var(--pink); box-shadow:0 0 0 4px rgba(255,45,134,.15); }
    .badge{
      font-size:12px; padding:4px 8px; border:1px solid var(--border);
      border-radius:999px; background:rgba(255,255,255,.03); color:var(--muted);
    }
    .pill{
      display:inline-flex; align-items:center; gap:8px;
      padding:6px 10px; border-radius:999px; border:1px solid var(--border);
      background:rgba(255,255,255,.03); color:var(--muted); font-size:12px;
    }
    .mono{ font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace; }

    .card{
      background: var(--card);
      border:1px solid var(--border);
      border-radius:16px;
      padding:14px;
      box-shadow:var(--shadow);
      margin-bottom:12px;
    }
    .card h2{ margin:0 0 10px 0; font-size:16px; letter-spacing:.2px; }
    .muted{ color:var(--muted); font-size:13px; line-height:1.35; }
    .row{ display:flex; gap:10px; align-items:center; }
    .row > *{ flex:1; }

    input, select, textarea{
      width:100%;
      padding:12px;
      border-radius:14px;
      border:1px solid var(--border);
      background:rgba(255,255,255,.03);
      color:var(--text);
      outline:none;
      font-size:15px;
    }
    textarea{ min-height:100px; resize:vertical; }

    button{
      width:100%;
      padding:12px;
      border-radius:14px;
      border:1px solid transparent;
      background:rgba(255,255,255,.06);
      color:var(--text);
      font-weight:750;
      cursor:pointer;
      transition:.15s ease;
    }
    button:active{ transform:translateY(1px); }
    button:disabled{ opacity:.55; cursor:not-allowed; }
    .btn-pink{
      background: linear-gradient(180deg, rgba(255,45,134,.95), rgba(255,45,134,.75));
      border-color: rgba(255,45,134,.35);
      box-shadow: 0 10px 24px rgba(255,45,134,.18);
    }
    .btn-ghost{
      background: rgba(255,255,255,.04);
      border-color: var(--border);
      color: var(--muted);
    }
    .btn-danger{
      background: rgba(255,77,77,.14);
      border-color: rgba(255,77,77,.25);
    }

    .pin{
      font-size:30px;
      letter-spacing:6px;
      font-weight:950;
      text-align:center;
      padding:10px 0;
      color:var(--pink2);
      text-shadow:0 0 18px rgba(255,102,176,.25);
    }
    .ok{ color:var(--good); font-weight:800; }
    .err{ color:var(--bad); font-weight:800; }

    .divider{ height:1px; background:rgba(255,255,255,.06); margin:12px 0; }

    /* Bottom tabs */
    .tabs{
      position:fixed;
      left:0; right:0; bottom:0;
      padding:10px 12px calc(10px + env(safe-area-inset-bottom));
      background: rgba(11,11,16,.94);
      border-top:1px solid rgba(255,255,255,.08);
      backdrop-filter: blur(10px);
      display:flex;
      gap:10px;
      z-index:999;
    }
    .tabbtn{
      flex:1;
      padding:12px 10px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.04);
      color: var(--muted);
      font-weight:850;
    }
    .tabbtn.active{
      background: rgba(255,45,134,.18);
      border-color: rgba(255,45,134,.45);
      color: var(--text);
      box-shadow: 0 10px 20px rgba(255,45,134,.10);
    }

    /* Vertical day board */
    .board{
      display:flex;
      gap:12px;
    }
    .col{
      flex:1;
      background: rgba(255,255,255,.03);
      border:1px solid var(--border);
      border-radius:16px;
      overflow:hidden;
    }
    .colhead{
      padding:12px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      background: rgba(255,255,255,.02);
      border-bottom:1px solid rgba(255,255,255,.06);
    }
    .who{
      display:flex; align-items:center; gap:10px;
      font-weight:950;
    }
    .avatar{
      width:34px; height:34px; border-radius:12px;
      background: rgba(255,45,134,.14);
      border:1px solid rgba(255,45,134,.28);
      display:flex; align-items:center; justify-content:center;
      font-weight:950; color: var(--pink2);
    }
    .colhead small{ display:block; font-weight:700; font-size:12px; color:var(--muted); margin-top:2px; }

    .daywrap{
      position:relative;
      height: 980px;      /* видимая высота */
      overflow:auto;      /* скролл внутри суток */
      background: linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,.01));
    }
    .daygrid{
      position:relative;
      height: 1440px;     /* 1px = 1 минута (простая математика) */
      min-height: 1440px;
    }
    .hline{
      position:absolute;
      left:0; right:0;
      height:1px;
      background: rgba(255,255,255,.06);
    }
    .hlabel{
      position:absolute;
      left:10px;
      transform: translateY(-50%);
      font-size:11px;
      color: rgba(244,244,255,.42);
      background: rgba(11,11,16,.65);
      border:1px solid rgba(255,255,255,.08);
      border-radius:999px;
      padding:3px 8px;
      pointer-events:none;
    }

    .event{
      position:absolute;
      left:60px;
      right:10px;
      border-radius:14px;
      padding:8px 10px;
      border:1px solid rgba(255,255,255,.14);
      box-shadow: 0 10px 18px rgba(0,0,0,.35);
      cursor:pointer;
      overflow:hidden;
    }
    .event .t{
      font-weight:950;
      font-size:12px;
      line-height:1.1;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
      margin-bottom:3px;
    }
    .event .s{
      font-size:11px;
      color: rgba(244,244,255,.78);
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .event.any{
      top: 10px;
      height: 70px;
    }
    .event.approx{
      border-style: dashed;
    }

    /* Opaque modals (bug #2 fix) */
    .backdrop{
      position:fixed;
      inset:0;
      background: var(--bg); /* полностью непрозрачный */
      display:none;
      z-index:2000;
      overflow:auto;
      padding:12px;
    }
    .modal{
      max-width:620px;
      margin: 0 auto;
      background: var(--card);  /* непрозрачный */
      border:1px solid var(--border);
      border-radius:20px;
      box-shadow:var(--shadow);
      padding:14px;
    }
    .modalhead{
      display:flex; align-items:center; justify-content:space-between; gap:10px;
      margin-bottom:10px;
    }
    .modalhead h3{ margin:0; font-size:15px; font-weight:950; }
    .closeX{
      width:42px; height:42px;
      border-radius:14px;
      border:1px solid var(--border);
      background: rgba(255,255,255,.03);
      color: var(--muted);
      font-size:18px;
      cursor:pointer;
    }

    .colors{ display:flex; gap:10px; flex-wrap:wrap; }
    .colorbtn{
      width:42px; height:42px; border-radius:14px;
      border:1px solid rgba(255,255,255,.12);
      cursor:pointer;
      position:relative;
    }
    .colorbtn.sel::after{
      content:"";
      position:absolute; inset:10px;
      border-radius:10px;
      border:2px solid rgba(255,255,255,.85);
    }

    .hidden{ display:none; }
  </style>
</head>

<body>
  <div class="topbar">
    <div class="brand">
      <span class="dot"></span>
      Shared Schedule
      <span class="badge">private ×2</span>
    </div>
    <div class="pill" id="statusPill"><span class="mono">…</span></div>
  </div>

  <div id="app"></div>

  <!-- Create screen uses this same form block (not as modal) -->
  <div class="backdrop" id="noteBackdrop">
    <div class="modal">
      <div class="modalhead">
        <h3 id="noteTitle">Событие</h3>
        <button class="closeX" id="noteClose">✕</button>
      </div>

      <div class="card" style="margin:0; box-shadow:none;">
        <div id="noteMeta" class="muted" style="margin-bottom:10px;"></div>

        <div class="row" style="margin-bottom:10px;">
          <button class="btn-ghost" id="btnAddNote">Добавить заметку</button>
          <button class="btn-danger" id="btnDeleteSeries">Удалить событие</button>
        </div>

        <div id="addNoteBox" class="hidden">
          <textarea id="noteText" placeholder="Заметка (видна обоим)"></textarea>
          <button class="btn-pink" id="btnSendNote">Отправить заметку</button>
        </div>

        <div class="divider"></div>
        <div class="muted" style="margin-bottom:8px;">Заметки на дату:</div>
        <div id="notesList" class="muted"></div>
      </div>
    </div>
  </div>

  <div class="tabs hidden" id="tabs">
    <button class="tabbtn" id="tabSchedule">Schedule</button>
    <button class="tabbtn" id="tabCreate">Create</button>
    <button class="tabbtn" id="tabProfile">Profile</button>
  </div>

  <script>
    const tg = window.Telegram?.WebApp;

    const COLORS = [
      { id:"c1", hex:getCss("--c1") },
      { id:"c2", hex:getCss("--c2") },
      { id:"c3", hex:getCss("--c3") },
      { id:"c4", hex:getCss("--c4") },
      { id:"c5", hex:getCss("--c5") },
      { id:"c6", hex:getCss("--c6") },
    ];

    const state = {
      me: null,
      lastPin: null,
      error: null,
      date: todayISO(),

      dayData: null,
      since: null,
      pollTimer: null,

      screen: "boot", // boot | pair | schedule | create | profile
      weeklyMask: 0,

      createForm: {
        title:"",
        color:"c1",
        timeKind:"exact",
        start:"09:00",
        end:"18:00",
        recurrence:"none",
        singleDate: todayISO(),
        cyclePattern:"1100",
        cycleAnchor: todayISO()
      },

      selectedEvent: null
    };

    function apiFetch(path, options = {}) {
      if (!tg || !tg.initData) throw new Error("Telegram WebApp initData not found");
      const headers = Object.assign({}, options.headers || {}, {
        "Content-Type": "application/json",
        "X-TG-INIT-DATA": tg.initData
      });
      return fetch(path, Object.assign({}, options, { headers }));
    }

    function setPill(text){
      document.getElementById("statusPill").innerHTML = `<span class="mono">${escapeHtml(text)}</span>`;
    }

    function todayISO(){
      const d = new Date();
      return d.toISOString().slice(0,10);
    }
    function addDays(dateISO, delta){
      const d = new Date(dateISO + "T00:00:00");
      d.setDate(d.getDate() + delta);
      return d.toISOString().slice(0,10);
    }
    function fmtDow(dateISO){
      const d = new Date(dateISO + "T00:00:00");
      const days = ["Вс","Пн","Вт","Ср","Чт","Пт","Сб"];
      return days[d.getDay()];
    }

    function hmToMin(hm){
      const m = /^(\d{1,2}):(\d{2})$/.exec(String(hm||"").trim());
      if(!m) return null;
      const h = Number(m[1]), mi = Number(m[2]);
      if(h<0||h>23||mi<0||mi>59) return null;
      return h*60+mi;
    }
    function minToHm(min){
      if(min===null || min===undefined) return "—";
      const h = Math.floor(min/60);
      const m = min%60;
      return String(h).padStart(2,"0")+":"+String(m).padStart(2,"0");
    }

    function getCss(varName){
      return getComputedStyle(document.documentElement).getPropertyValue(varName).trim();
    }
    function colorHex(id){
      return (COLORS.find(c=>c.id===id)?.hex) || getCss("--pink");
    }

    function myId(){ return state.me?.tgUserId; }
    function otherId(){ return state.me?.otherUserId; }

    function toast(msg){
      state.error = msg;
      render();
      setTimeout(()=>{ state.error=null; render(); }, 2200);
    }

    function stopPolling(){
      if(state.pollTimer) clearInterval(state.pollTimer);
      state.pollTimer = null;
    }
    function startPolling(){
      stopPolling();
      state.pollTimer = setInterval(()=> loadDay(false), 4000);
    }

    async function loadMe(){
      try{
        const res = await apiFetch("/api/me");
        const data = await res.json();
        state.me = data;

        const paired = (data?.paired === true); // фикс бага №1 (строго boolean)
        setPill(paired ? "paired" : "not paired");

        if(!paired){
          state.screen = "pair";
          document.getElementById("tabs").classList.add("hidden");
          stopPolling();
        } else {
          document.getElementById("tabs").classList.remove("hidden");
          if(state.screen === "boot" || state.screen === "pair") state.screen = "schedule";
        }
      } catch(e){
        setPill("error");
        state.error = e.message;
      }
    }

    async function loadDay(resetSince=false){
      if(!(state.me?.paired === true)) return;
      try{
        const qs = new URLSearchParams({ date: state.date });
        if(!resetSince && state.since) qs.set("since", state.since);
        const res = await apiFetch("/api/day?"+qs.toString());
        const data = await res.json();
        if(!res.ok) throw new Error(data.error || "day_failed");

        if(!state.dayData || resetSince){
          state.dayData = data;
        } else {
          state.dayData.serverTime = data.serverTime;
          const map = new Map((state.dayData.events||[]).map(e=>[e.eventKey,e]));
          for(const e of (data.events||[])) map.set(e.eventKey, e);
          state.dayData.events = Array.from(map.values());
          state.dayData.notes = (state.dayData.notes||[]).concat(data.notes||[]);
          state.dayData.members = data.members || state.dayData.members;
        }
        state.since = data.serverTime;
      } catch(e){
        state.error = e.message;
      }
      render();
    }

    async function createPair(){
      state.error=null; state.lastPin=null;
      render();
      try{
        const res = await apiFetch("/api/space/create", { method:"POST", body:"{}" });
        const data = await res.json();
        if(!res.ok) throw new Error(data.error || "create_failed");
        state.lastPin = data.pin;
      }catch(e){ state.error = e.message; }
      render();
    }

    async function joinPair(pin){
      state.error=null;
      render();
      try{
        const res = await apiFetch("/api/space/join", { method:"POST", body: JSON.stringify({ pin }) });
        const data = await res.json();
        if(!res.ok) throw new Error(data.error || "join_failed");
        await loadMe();
        await loadDay(true);
        startPolling();
      }catch(e){ state.error = e.message; }
      render();
    }

    function copyText(text){
      if(!text) return;
      navigator.clipboard?.writeText(text);
      tg?.showPopup?.({ title:"Скопировано", message:text });
    }

    function eventsFor(userId){
      const all = state.dayData?.events || [];
      return all.filter(e => String(e.ownerTgUserId) === String(userId));
    }

    function makeTimeLabel(e){
      if(e.timeKind === "anytime") return "Anytime";
      const a = minToHm(e.startMin);
      const b = minToHm(e.endMin);
      return (e.timeKind === "approx" ? "~ " : "") + a + "–" + b;
    }

    function renderColumn(elId, userId, label){
      const el = document.getElementById(elId);
      const evs = eventsFor(userId);

      let html = `
        <div class="col">
          <div class="colhead">
            <div class="who">
              <div class="avatar">${escapeHtml(label.slice(0,1).toUpperCase())}</div>
              <div>
                ${escapeHtml(label)}
                <small class="mono">${escapeHtml(String(userId || "—"))}</small>
              </div>
            </div>
            <span class="pill">${escapeHtml(String(evs.length))} events</span>
          </div>

          <div class="daywrap">
            <div class="daygrid" id="${elId}_grid">
      `;

      for(let h=0; h<=24; h++){
        const top = h*60;
        html += `<div class="hline" style="top:${top}px"></div>`;
        if(h<24){
          html += `<div class="hlabel" style="top:${top+1}px">${escapeHtml(String(h).padStart(2,"0")+":00")}</div>`;
        }
      }

      for(const e of evs){
        let top = 10, height = 70, cls = "event any";
        if(e.timeKind !== "anytime"){
          const s = Number(e.startMin ?? 0);
          const en = Number(e.endMin ?? (s+60));
          top = Math.max(0, Math.min(1440, s));
          height = Math.max(18, Math.min(1440-top, en - s));
          cls = "event";
          if(e.timeKind === "approx") cls += " approx";
        }
        const col = colorHex(e.color);
        html += `
          <div class="${cls}" data-key="${escapeHtml(e.eventKey)}"
               style="top:${top}px; height:${height}px; background:${col}bb;">
            <div class="t">${escapeHtml(e.title)}</div>
            <div class="s">${escapeHtml(makeTimeLabel(e))}</div>
          </div>
        `;
      }

      html += `
            </div>
          </div>
        </div>
      `;

      el.innerHTML = html;

      el.querySelectorAll(".event").forEach(node=>{
        node.addEventListener("click", ()=>{
          const key = node.getAttribute("data-key");
          const ev = (state.dayData?.events||[]).find(x=>x.eventKey===key);
          if(ev) openEventDetails(ev);
        });
      });
    }

    // Notes modal
    function openNoteModal(){ document.getElementById("noteBackdrop").style.display = "block"; }
    function closeNoteModal(){
      document.getElementById("noteBackdrop").style.display = "none";
      document.getElementById("addNoteBox").classList.add("hidden");
      document.getElementById("noteText").value = "";
      state.selectedEvent = null;
    }

    function openEventDetails(ev){
      state.selectedEvent = ev;
      document.getElementById("noteTitle").textContent = ev.title;
      document.getElementById("noteMeta").innerHTML = `
        <div class="pill">Дата: <span class="mono">${escapeHtml(state.date)}</span></div>
        <div class="pill">Время: <span class="mono">${escapeHtml(makeTimeLabel(ev))}</span></div>
        <div class="pill">Owner: <span class="mono">${escapeHtml(String(ev.ownerTgUserId))}</span></div>
        <div class="pill">SeriesId: <span class="mono">${escapeHtml(String(ev.seriesId))}</span></div>
      `;

      const notes = (state.dayData?.notes||[]).filter(n=>Number(n.seriesId)===Number(ev.seriesId));
      const list = notes.map(n=>{
        const who = String(n.authorTgUserId)===String(myId()) ? "you" : "other";
        return `<div class="pill" style="margin:8px 0;">
          <span class="mono">${escapeHtml(n.createdAt.slice(11,16))}</span>
          <b>${escapeHtml(who)}</b>: ${escapeHtml(n.text)}
        </div>`;
      }).join("");
      document.getElementById("notesList").innerHTML = list || `<div class="muted">Пока нет заметок.</div>`;

      const delBtn = document.getElementById("btnDeleteSeries");
      if(String(ev.ownerTgUserId) !== String(myId())){
        delBtn.disabled = true;
        delBtn.textContent = "Удалить (только владелец)";
      } else {
        delBtn.disabled = false;
        delBtn.textContent = "Удалить событие";
      }

      openNoteModal();
    }

    async function sendNote(){
      const ev = state.selectedEvent;
      if(!ev) return;
      const text = document.getElementById("noteText").value.trim();
      if(!text){ toast("Введите текст заметки"); return; }
      try{
        const res = await apiFetch("/api/note", {
          method:"POST",
          body: JSON.stringify({ seriesId: ev.seriesId, date: state.date, text })
        });
        const data = await res.json();
        if(!res.ok) throw new Error(data.error || "note_failed");
        document.getElementById("noteText").value = "";
        document.getElementById("addNoteBox").classList.add("hidden");
        await loadDay(true);
        toast("Заметка добавлена");
      }catch(e){
        toast("Ошибка: "+e.message);
      }
    }

    async function deleteSeries(){
      const ev = state.selectedEvent;
      if(!ev) return;
      if(String(ev.ownerTgUserId) !== String(myId())) return;
      try{
        const res = await apiFetch("/api/series/"+ev.seriesId, { method:"DELETE" });
        const data = await res.json();
        if(!res.ok) throw new Error(data.error || "delete_failed");
        closeNoteModal();
        await loadDay(true);
        toast("Удалено");
      }catch(e){
        toast("Ошибка: "+e.message);
      }
    }

    // Create page helpers
    function buildColorRow(){
      const row = document.getElementById("colorRow");
      row.innerHTML = COLORS.map(c=>{
        const sel = state.createForm.color === c.id ? "sel" : "";
        return `<div class="colorbtn ${sel}" data-c="${c.id}" style="background:${c.hex};"></div>`;
      }).join("");
      row.querySelectorAll(".colorbtn").forEach(btn=>{
        btn.addEventListener("click", ()=>{
          state.createForm.color = btn.getAttribute("data-c");
          buildColorRow();
        });
      });
    }

    function setWeeklyBtnStyles(){
      const box = document.getElementById("weeklyBox");
      box.querySelectorAll("button[data-d]").forEach(b=>{
        const d = Number(b.getAttribute("data-d"));
        const on = (state.weeklyMask & (1<<d)) !== 0;
        b.style.borderColor = on ? "rgba(255,45,134,.55)" : "var(--border)";
        b.style.color = on ? "var(--text)" : "var(--muted)";
        b.style.background = on ? "rgba(255,45,134,.22)" : "rgba(255,255,255,.04)";
      });
    }

    function syncRecurrenceUI(){
      const r = document.getElementById("fRecurrence")?.value;
      const single = document.getElementById("fSingleDate");
      const weekly = document.getElementById("weeklyBox");
      const cycle = document.getElementById("cycleBox");

      if(r === "none"){
        single.disabled = false;
        weekly.classList.add("hidden");
        cycle.classList.add("hidden");
      } else if(r === "weekly"){
        single.disabled = true;
        weekly.classList.remove("hidden");
        cycle.classList.add("hidden");
      } else if(r === "cycle"){
        single.disabled = true;
        weekly.classList.add("hidden");
        cycle.classList.remove("hidden");
      }
    }

    async function saveEventFromCreate(){
      const title = document.getElementById("fTitle").value.trim();
      const timeKind = document.getElementById("fTimeKind").value;
      const start = document.getElementById("fStart").value.trim();
      const end = document.getElementById("fEnd").value.trim();
      const recurrence = document.getElementById("fRecurrence").value;

      if(!title){ toast("Название обязательно"); return; }

      let startMin=null, endMin=null;
      if(timeKind !== "anytime"){
        startMin = hmToMin(start);
        endMin = hmToMin(end);
        if(startMin===null || endMin===null){ toast("Время HH:MM"); return; }
        if(startMin >= endMin){ toast("Начало < конца"); return; }
      }

      const body = {
        title,
        color: state.createForm.color,
        timeKind,
        startMin,
        endMin,
        recurrenceKind: recurrence,
        singleDate: null,
        weeklyMask: null,
        cyclePattern: null,
        cycleAnchorDate: null
      };

      if(recurrence === "none"){
        const sd = document.getElementById("fSingleDate").value.trim();
        if(!/^\d{4}-\d{2}-\d{2}$/.test(sd)){ toast("Дата YYYY-MM-DD"); return; }
        body.singleDate = sd;
      } else if(recurrence === "weekly"){
        if(state.weeklyMask === 0){ toast("Выбери дни"); return; }
        body.weeklyMask = state.weeklyMask;
      } else if(recurrence === "cycle"){
        const p = document.getElementById("fCyclePattern").value.trim();
        const a = document.getElementById("fCycleAnchor").value.trim();
        if(!/^[01]{2,31}$/.test(p)){ toast("Pattern 0/1 (2..31)"); return; }
        if(!/^\d{4}-\d{2}-\d{2}$/.test(a)){ toast("Anchor YYYY-MM-DD"); return; }
        body.cyclePattern = p;
        body.cycleAnchorDate = a;
      }

      try{
        const res = await apiFetch("/api/series", { method:"POST", body: JSON.stringify(body) });
        const data = await res.json();
        if(!res.ok) throw new Error(data.error || "save_failed");

        toast("Событие добавлено");
        state.screen = "schedule";
        setActiveTab("schedule");
        await loadDay(true);
      }catch(e){
        toast("Ошибка: "+e.message);
      }
    }

    function setActiveTab(tab){
      const s = document.getElementById("tabSchedule");
      const c = document.getElementById("tabCreate");
      const p = document.getElementById("tabProfile");
      [s,c,p].forEach(x=>x.classList.remove("active"));
      if(tab==="schedule") s.classList.add("active");
      if(tab==="create") c.classList.add("active");
      if(tab==="profile") p.classList.add("active");
    }

    function render(){
      const root = document.getElementById("app");
      const errLine = state.error ? `<div class="card"><div class="err">${escapeHtml(state.error)}</div></div>` : "";

      if(!tg){
        root.innerHTML = `<div class="card"><h2>Открой в Telegram</h2><div class="muted">Работает только внутри Telegram Mini App.</div></div>`;
        return;
      }

      if(!state.me){
        root.innerHTML = `
          <div class="card">
            <h2>Запуск…</h2>
            <div class="muted">Получаю /api/me</div>
            <div class="divider"></div>
            <button class="btn-pink" id="btnReload">Обновить</button>
          </div>
          ${errLine}
        `;
        document.getElementById("btnReload").onclick = init;
        return;
      }

      const paired = (state.me.paired === true);

      if(!paired){
        root.innerHTML = `
          <div class="card">
            <h2>Связь по PIN</h2>
            <div class="muted">Сначала свяжите 2 аккаунта. После этого откроются разделы Schedule / Create / Profile.</div>
          </div>

          <div class="card">
            <h2>Создать PIN</h2>
            <button class="btn-pink" id="btnCreate">Создать PIN на 10 минут</button>
            ${state.lastPin ? `
              <div class="pin">${escapeHtml(state.lastPin)}</div>
              <div class="row">
                <button class="btn-ghost" id="btnCopy">Скопировать</button>
                <button class="btn-ghost" id="btnRefreshMe">Я уже связал(а)</button>
              </div>
              <div class="muted">PIN одноразовый: после подключения второго — сгорит.</div>
            ` : ``}
          </div>

          <div class="card">
            <h2>Ввести PIN</h2>
            <input id="pinInput" inputmode="numeric" maxlength="6" placeholder="6 цифр" />
            <button class="btn-pink" id="btnJoin">Подключиться</button>
          </div>

          ${errLine}
        `;

        document.getElementById("btnCreate").onclick = createPair;
        if(state.lastPin){
          document.getElementById("btnCopy").onclick = ()=>copyText(state.lastPin);
          document.getElementById("btnRefreshMe").onclick = async ()=>{ await loadMe(); render(); };
        }
        const pinInput = document.getElementById("pinInput");
        pinInput.addEventListener("input", ()=>{ pinInput.value = pinInput.value.replace(/\D/g,"").slice(0,6); });
        document.getElementById("btnJoin").onclick = ()=>{
          const pin = pinInput.value.trim();
          if(!/^\d{6}$/.test(pin)){ state.error="Введите 6 цифр"; render(); return; }
          joinPair(pin);
        };
        return;
      }

      // Paired UI (tabs)
      document.getElementById("tabs").classList.remove("hidden");

      if(state.screen === "schedule"){
        setActiveTab("schedule");

        root.innerHTML = `
          <div class="card">
            <div class="row" style="align-items:flex-start;">
              <div>
                <h2>Schedule</h2>
                <div class="muted">
                  <span class="pill">Дата: <span class="mono">${escapeHtml(state.date)}</span></span>
                  <span class="pill">День: <span class="mono">${escapeHtml(fmtDow(state.date))}</span></span>
                </div>
              </div>
              <div style="text-align:right;">
                <div class="pill">spaceId: <span class="mono">${escapeHtml(String(state.me.spaceId))}</span></div>
                <div class="pill">poll: <span class="mono">${state.pollTimer ? "on" : "off"}</span></div>
              </div>
            </div>

            <div class="divider"></div>

            <div class="row">
              <button class="btn-ghost" id="btnPrev">←</button>
              <button class="btn-ghost" id="btnToday">Сегодня</button>
              <button class="btn-ghost" id="btnNext">→</button>
            </div>

            <div class="row" style="margin-top:10px;">
              <button class="btn-ghost" id="btnTomorrow">Завтра</button>
              <input id="datePick" type="date" value="${escapeHtml(state.date)}" />
              <button class="btn-ghost" id="btnRefreshDay">Обновить</button>
            </div>
          </div>

          <div class="board">
            <div id="colMe"></div>
            <div id="colOther"></div>
          </div>

          ${errLine}
        `;

        document.getElementById("btnPrev").onclick = async ()=>{ state.date = addDays(state.date,-1); state.since=null; await loadDay(true); };
        document.getElementById("btnNext").onclick = async ()=>{ state.date = addDays(state.date,+1); state.since=null; await loadDay(true); };
        document.getElementById("btnToday").onclick = async ()=>{ state.date = todayISO(); state.since=null; await loadDay(true); };
        document.getElementById("btnTomorrow").onclick = async ()=>{ state.date = addDays(todayISO(), +1); state.since=null; await loadDay(true); };
        document.getElementById("btnRefreshDay").onclick = ()=>loadDay(true);
        document.getElementById("datePick").onchange = async (e)=>{ state.date = e.target.value; state.since=null; await loadDay(true); };

        renderColumn("colMe", myId(), "You");
        renderColumn("colOther", otherId(), state.me.otherUserId ? "Partner" : "Waiting…");
        return;
      }

      if(state.screen === "create"){
        setActiveTab("create");
        const d = state.date;

        root.innerHTML = `
          <div class="card">
            <h2>Create Event</h2>
            <div class="muted">Событие создаётся в твоём графике. Второй человек увидит его почти сразу (poll).</div>
          </div>

          <div class="card">
            <div class="row" style="margin-bottom:10px;">
              <input id="fTitle" placeholder="Название (например: Работа)" />
              <select id="fTimeKind">
                <option value="exact">Exact</option>
                <option value="approx">Approx</option>
                <option value="anytime">Anytime</option>
              </select>
            </div>

            <div class="row" style="margin-bottom:10px;">
              <input id="fStart" placeholder="Начало (HH:MM)" />
              <input id="fEnd" placeholder="Конец (HH:MM)" />
            </div>

            <div class="divider"></div>

            <div class="row" style="margin-bottom:10px;">
              <select id="fRecurrence">
                <option value="none">Single date</option>
                <option value="weekly">Weekly</option>
                <option value="cycle">Cycle (2/2)</option>
              </select>
              <input id="fSingleDate" placeholder="Дата (YYYY-MM-DD)" />
            </div>

            <div id="weeklyBox" class="card hidden" style="margin:0 0 10px 0; box-shadow:none; background:rgba(255,255,255,.02);">
              <div class="muted" style="margin-bottom:8px;">Дни недели:</div>
              <div class="row">
                <button class="btn-ghost" data-d="0">Пн</button>
                <button class="btn-ghost" data-d="1">Вт</button>
                <button class="btn-ghost" data-d="2">Ср</button>
                <button class="btn-ghost" data-d="3">Чт</button>
                <button class="btn-ghost" data-d="4">Пт</button>
                <button class="btn-ghost" data-d="5">Сб</button>
                <button class="btn-ghost" data-d="6">Вс</button>
              </div>
            </div>

            <div id="cycleBox" class="card hidden" style="margin:0 0 10px 0; box-shadow:none; background:rgba(255,255,255,.02);">
              <div class="muted" style="margin-bottom:8px;">Cycle pattern:</div>
              <div class="row" style="margin-bottom:10px;">
                <input id="fCyclePattern" placeholder="Pattern (например 1100)" />
                <input id="fCycleAnchor" placeholder="Anchor date (YYYY-MM-DD)" />
              </div>
              <div class="muted">“1100” = работа 2 дня, выходной 2 дня.</div>
            </div>

            <div class="muted" style="margin:10px 0 8px 0;">Цвет:</div>
            <div class="colors" id="colorRow"></div>

            <div class="divider"></div>

            <button class="btn-pink" id="btnSave">Сохранить</button>
          </div>

          ${errLine}
        `;

        // defaults
        document.getElementById("fTitle").value = "";
        document.getElementById("fTimeKind").value = "exact";
        document.getElementById("fStart").value = "09:00";
        document.getElementById("fEnd").value = "18:00";
        document.getElementById("fRecurrence").value = "none";
        document.getElementById("fSingleDate").value = d;
        document.getElementById("fCyclePattern").value = "1100";
        document.getElementById("fCycleAnchor").value = d;

        state.weeklyMask = 0;
        state.createForm.color = "c1";
        buildColorRow();
        syncRecurrenceUI();
        setWeeklyBtnStyles();

        document.getElementById("fRecurrence").addEventListener("change", syncRecurrenceUI);
        document.getElementById("weeklyBox").querySelectorAll("button[data-d]").forEach(b=>{
          b.addEventListener("click", ()=>{
            const day = Number(b.getAttribute("data-d"));
            state.weeklyMask = state.weeklyMask ^ (1<<day);
            setWeeklyBtnStyles();
          });
        });

        document.getElementById("btnSave").onclick = saveEventFromCreate;
        return;
      }

      if(state.screen === "profile"){
        setActiveTab("profile");

        const members = state.dayData?.members || [];
        root.innerHTML = `
          <div class="card">
            <h2>Profile</h2>
            <div class="muted">Информация о связи и аккаунтах.</div>
            <div class="divider"></div>
            <div class="pill">you: <span class="mono">${escapeHtml(String(state.me.tgUserId))}</span></div>
            <div style="height:8px;"></div>
            <div class="pill">partner: <span class="mono">${escapeHtml(String(state.me.otherUserId || "—"))}</span></div>
            <div style="height:8px;"></div>
            <div class="pill">spaceId: <span class="mono">${escapeHtml(String(state.me.spaceId))}</span></div>
            <div class="divider"></div>
            <button class="btn-ghost" id="btnProfileRefresh">Обновить /api/me</button>
          </div>

          <div class="card">
            <h2>Members</h2>
            <div class="muted">${members.length ? members.map(m=>`<span class="pill mono">${escapeHtml(m.tgUserId)}</span>`).join(" ") : "—"}</div>
          </div>

          ${errLine}
        `;

        document.getElementById("btnProfileRefresh").onclick = async ()=>{
          await loadMe();
          await loadDay(true);
          render();
        };
        return;
      }
    }

    function wireGlobal(){
      // tabs
      document.getElementById("tabSchedule").onclick = async ()=>{
        state.screen = "schedule";
        render();
        await loadDay(true);
      };
      document.getElementById("tabCreate").onclick = ()=>{
        state.screen = "create";
        render();
      };
      document.getElementById("tabProfile").onclick = ()=>{
        state.screen = "profile";
        render();
      };

      // note modal controls
      document.getElementById("noteClose").onclick = closeNoteModal;
      document.getElementById("btnAddNote").onclick = ()=>{
        document.getElementById("addNoteBox").classList.toggle("hidden");
      };
      document.getElementById("btnSendNote").onclick = sendNote;
      document.getElementById("btnDeleteSeries").onclick = deleteSeries;
    }

    function escapeHtml(s) {
      return String(s)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    async function init(){
      state.error=null;
      if(tg) tg.ready();
      wireGlobal();
      await loadMe();

      if(state.me?.paired === true){
        await loadDay(true);
        startPolling();
      }

      render();
    }

    // Start
    init();
  </script>
</body>
</html>
