<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Shared Schedule</title>

  <!-- ✅ правильный viewport + запрет зума -->
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    :root{
      --bg:#0b0b10;
      --card:#12121a;
      --text:#f4f4ff;
      --muted:#a7a7c2;
      --border:#242436;
      --pink:#ff2d86;
      --pink2:#ff66b0;
      --good:#19c37d;
      --bad:#ff4d4d;
      --shadow:0 10px 30px rgba(0,0,0,.35);

      --c1:#ff2d86;
      --c2:#a855f7;
      --c3:#22c55e;
      --c4:#38bdf8;
      --c5:#f97316;
      --c6:#facc15;

      --app-h: 100vh; /* будет заменено tg.viewportStableHeight */
    }

    *{ box-sizing:border-box; }

    html, body{
      height:100%;
      margin:0;
      padding:0;
      overflow:hidden;
      overscroll-behavior: none;
      -webkit-text-size-adjust: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    }

    .app{
      height: var(--app-h, 100vh);
      display:flex;
      flex-direction:column;
      background:
        radial-gradient(1200px 800px at 40% -10%, rgba(255,45,134,.20), transparent 60%),
        radial-gradient(900px 600px at 110% 10%, rgba(168,85,247,.16), transparent 60%),
        var(--bg);
    }

    .topbar{
      padding: 14px 14px 10px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex: 0 0 auto;
    }
    .brand{
      font-weight:950; letter-spacing:.2px;
      display:flex; align-items:center; gap:10px;
      min-width: 0;
    }
    .dot{
      width:9px; height:9px; border-radius:999px;
      background:var(--pink);
      box-shadow:0 0 0 4px rgba(255,45,134,.15);
      flex: 0 0 auto;
    }
    .badge{
      font-size:12px; padding:4px 8px; border:1px solid var(--border);
      border-radius:999px; background:rgba(255,255,255,.03); color:var(--muted);
      flex: 0 0 auto;
    }
    .pill{
      display:inline-flex; align-items:center; gap:8px;
      padding:6px 10px; border-radius:999px; border:1px solid var(--border);
      background:rgba(255,255,255,.03); color:var(--muted); font-size:12px;
      max-width: 48vw;
      overflow:hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .mono{ font-family: ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace; }

    .content{
      flex: 1 1 auto;
      overflow:auto;
      -webkit-overflow-scrolling: touch;
      padding: 0 14px 14px;
      touch-action: manipulation;
    }

    .card{
      background: var(--card);
      border:1px solid var(--border);
      border-radius:16px;
      padding:14px;
      box-shadow:var(--shadow);
      margin-bottom:12px;
    }
    .card h2{ margin:0 0 10px 0; font-size:16px; letter-spacing:.2px; }
    .muted{ color:var(--muted); font-size:13px; line-height:1.35; }
    .err{ color:var(--bad); font-weight:900; }

    .row{ display:flex; gap:10px; align-items:center; }
    .row > *{ flex:1; }

    /* ✅ iOS zoom fix: font-size >= 16px */
    input, select, textarea, button{ font-size:16px; }

    input, select, textarea{
      width:100%;
      padding:12px;
      border-radius:14px;
      border:1px solid var(--border);
      background:rgba(255,255,255,.03);
      color:var(--text);
      outline:none;
    }
    textarea{ min-height:110px; resize:vertical; }

    button{
      width:100%;
      padding:12px;
      border-radius:14px;
      border:1px solid transparent;
      background:rgba(255,255,255,.06);
      color:var(--text);
      font-weight:850;
      cursor:pointer;
      transition: .12s ease;
    }
    button:active{ filter: brightness(1.05); }
    button:disabled{ opacity:.55; cursor:not-allowed; }

    .btn-pink{
      background: linear-gradient(180deg, rgba(255,45,134,.95), rgba(255,45,134,.75));
      border-color: rgba(255,45,134,.35);
      box-shadow: 0 10px 24px rgba(255,45,134,.18);
    }
    .btn-ghost{
      background: rgba(255,255,255,.04);
      border-color: var(--border);
      color: var(--muted);
    }
    .btn-danger{
      background: rgba(255,77,77,.14);
      border-color: rgba(255,77,77,.25);
    }

    .divider{ height:1px; background:rgba(255,255,255,.06); margin:12px 0; }

    .pin{
      font-size:30px;
      letter-spacing:6px;
      font-weight:950;
      text-align:center;
      padding:10px 0;
      color:var(--pink2);
      text-shadow:0 0 18px rgba(255,102,176,.25);
      user-select: all;
    }

    .tabs{
      flex: 0 0 auto;
      padding: 12px 14px calc(12px + env(safe-area-inset-bottom));
      background: rgba(11,11,16,.96);
      border-top:1px solid rgba(255,255,255,.10);
      backdrop-filter: blur(10px);
      display:flex;
      gap:12px;
    }
    .tabbtn{
      flex:1;
      padding:16px 10px;
      border-radius:16px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.05);
      color: var(--muted);
      font-weight:950;
      font-size:14px;
      letter-spacing:.2px;
    }
    .tabbtn.active{
      background: rgba(255,45,134,.22);
      border-color: rgba(255,45,134,.50);
      color: var(--text);
      box-shadow: 0 10px 20px rgba(255,45,134,.10);
    }
    .hidden{ display:none !important; }

    .board{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:12px;
      width:100%;
    }
    @media (max-width: 430px){
      .board{ grid-template-columns: 1fr; }
    }

    .col{
      background: rgba(255,255,255,.03);
      border:1px solid var(--border);
      border-radius:16px;
      overflow:hidden;
      min-width:0;
    }
    .colhead{
      padding:12px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      background: rgba(255,255,255,.02);
      border-bottom:1px solid rgba(255,255,255,.06);
    }
    .who{
      display:flex; align-items:center; gap:10px;
      font-weight:950;
      min-width:0;
    }
    .avatar{
      width:34px; height:34px; border-radius:12px;
      background: rgba(255,45,134,.14);
      border:1px solid rgba(255,45,134,.28);
      display:flex; align-items:center; justify-content:center;
      font-weight:950; color: var(--pink2);
      flex:0 0 auto;
    }
    .who .names{ min-width:0; }
    .who .names .t{
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
      max-width: 100%;
    }
    .who small{
      display:block; font-weight:700; font-size:12px; color:var(--muted); margin-top:2px;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
      max-width: 100%;
    }

    .daywrap{
      position:relative;
      height: 700px;
      overflow:auto;
      background: linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,.01));
      -webkit-overflow-scrolling: touch;
    }
    .daygrid{
      position:relative;
      height: 1440px;
      min-height:1440px;
    }
    .hline{
      position:absolute;
      left:0; right:0;
      height:1px;
      background: rgba(255,255,255,.06);
    }
    .hlabel{
      position:absolute;
      left:10px;
      height:18px;
      line-height:18px;
      font-size:11px;
      color: rgba(244,244,255,.42);
      background: rgba(11,11,16,.70);
      border:1px solid rgba(255,255,255,.08);
      border-radius:999px;
      padding:0 8px;
      pointer-events:none;
    }

    .event{
      position:absolute;
      left:60px;
      right:10px;
      border-radius:14px;
      padding:8px 10px;
      border:1px solid rgba(255,255,255,.14);
      box-shadow: 0 10px 18px rgba(0,0,0,.35);
      cursor:pointer;
      overflow:hidden;
      -webkit-tap-highlight-color: transparent;
    }
    .event .tt{
      font-weight:950;
      font-size:12px;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
      margin-bottom:3px;
    }
    .event .ss{
      font-size:11px;
      color: rgba(244,244,255,.78);
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .event.any{ top: 10px; height: 70px; }
    .event.approx{ border-style:dashed; }

    .notesBox .noteItem{
      padding:10px;
      border:1px solid rgba(255,255,255,.08);
      border-radius:14px;
      background: rgba(255,255,255,.03);
      margin-bottom:10px;
    }
    .notesBox .noteMeta{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      color: var(--muted);
      font-size:12px;
      margin-bottom:6px;
    }

    .backdrop{
      position:fixed;
      inset:0;
      background: var(--bg);
      display:none;
      z-index:2000;
      overflow:auto;
      -webkit-overflow-scrolling: touch;
      padding:12px;
    }
    .modal{
      max-width:620px;
      margin:0 auto;
      background: var(--card);
      border:1px solid var(--border);
      border-radius:20px;
      box-shadow:var(--shadow);
      padding:14px;
    }
    .modalhead{
      display:flex; align-items:center; justify-content:space-between; gap:10px;
      margin-bottom:10px;
    }
    .modalhead h3{ margin:0; font-size:15px; font-weight:950; }
    .closeX{
      width:42px; height:42px;
      border-radius:14px;
      border:1px solid var(--border);
      background: rgba(255,255,255,.03);
      color: var(--muted);
      font-size:18px;
      cursor:pointer;
    }

    .colors{ display:flex; gap:10px; flex-wrap:wrap; }
    .colorbtn{
      width:42px; height:42px; border-radius:14px;
      border:1px solid rgba(255,255,255,.12);
      cursor:pointer; position:relative;
    }
    .colorbtn.sel::after{
      content:"";
      position:absolute; inset:10px;
      border-radius:10px;
      border:2px solid rgba(255,255,255,.85);
    }

    .seg{
      display:flex;
      gap:10px;
      margin-bottom:10px;
    }
    .seg button{
      flex:1;
      padding:12px 10px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.04);
      color: var(--muted);
      font-weight:950;
    }
    .seg button.active{
      background: rgba(255,45,134,.20);
      border-color: rgba(255,45,134,.45);
      color: var(--text);
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="topbar">
      <div class="brand">
        <span class="dot"></span>
        <span style="min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">Shared Schedule</span>
        <span class="badge">private ×2</span>
      </div>
      <div class="pill" id="statusPill"><span class="mono">…</span></div>
    </div>

    <div class="content">
      <div id="app"></div>
    </div>

    <div class="tabs hidden" id="tabs">
      <button class="tabbtn" id="tabSchedule">Schedule</button>
      <button class="tabbtn" id="tabCreate">Create</button>
      <button class="tabbtn" id="tabProfile">Profile</button>
    </div>
  </div>

  <!-- Fullscreen event note modal -->
  <div class="backdrop" id="eventBackdrop">
    <div class="modal">
      <div class="modalhead">
        <h3 id="eventTitle">Событие</h3>
        <button class="closeX" id="eventClose">✕</button>
      </div>

      <div class="card" style="margin:0; box-shadow:none;">
        <div id="eventMeta" class="muted" style="margin-bottom:10px;"></div>

        <div class="row" style="margin-bottom:10px;">
          <button class="btn-ghost" id="btnAddEventNote">Добавить заметку к событию</button>
          <button class="btn-danger" id="btnDeleteSeries">Удалить событие</button>
        </div>

        <div id="addEventNoteBox" class="hidden">
          <textarea id="eventNoteText" placeholder="Заметка к событию (видна обоим)"></textarea>
          <button class="btn-pink" id="btnSendEventNote">Отправить</button>
        </div>

        <div class="divider"></div>
        <div class="muted" style="margin-bottom:8px;">Заметки к этому событию (на дату):</div>
        <div id="eventNotesList" class="muted"></div>
      </div>
    </div>
  </div>

  <script>
    const tg = window.Telegram?.WebApp;

    function applyTelegramViewport(){
      if(!tg) return;
      tg.ready();
      tg.expand();

      const apply = ()=>{
        const h = tg.viewportStableHeight || window.innerHeight;
        document.documentElement.style.setProperty('--app-h', h + 'px');
      };

      apply();
      tg.onEvent('viewportChanged', apply);
    }

    applyTelegramViewport();

    function getCss(varName){
      return getComputedStyle(document.documentElement).getPropertyValue(varName).trim();
    }

    const COLORS = [
      { id:"c1", hex:getCss("--c1") },
      { id:"c2", hex:getCss("--c2") },
      { id:"c3", hex:getCss("--c3") },
      { id:"c4", hex:getCss("--c4") },
      { id:"c5", hex:getCss("--c5") },
      { id:"c6", hex:getCss("--c6") },
    ];

    const state = {
      me: null,
      lastPin: null,
      error: null,

      screen: "boot", // boot | pair | schedule | create | profile
      date: todayISO(),
      dayData: null,
      since: null,
      pollTimer: null,
      actionLock: false,

      weeklyMask: 0,

      createMode: "event", // event | note
      form: {
        title: "",
        timeKind: "exact",
        start: "09:00",
        end: "18:00",
        recurrence: "none",
        singleDate: todayISO(),
        cyclePattern: "1100",
        cycleAnchor: todayISO(),
        color: "c1"
      },

      noteForm: {
        date: todayISO(),
        text: ""
      },

      selectedEvent: null
    };

    function realPaired(){
      return state.me?.membersCount === 2 && state.me?.paired === true;
    }

    function apiFetch(path, options = {}) {
      if (!tg || !tg.initData) throw new Error("Telegram WebApp initData not found");
      const headers = Object.assign({}, options.headers || {}, {
        "Content-Type": "application/json",
        "X-TG-INIT-DATA": tg.initData
      });
      return fetch(path, Object.assign({}, options, { headers }));
    }

    function setPill(text){
      document.getElementById("statusPill").innerHTML = `<span class="mono">${escapeHtml(text)}</span>`;
    }

    function todayISO(){
      const d = new Date();
      return d.toISOString().slice(0,10);
    }
    function addDays(dateISO, delta){
      const d = new Date(dateISO + "T00:00:00");
      d.setDate(d.getDate() + delta);
      return d.toISOString().slice(0,10);
    }
    function fmtDow(dateISO){
      const d = new Date(dateISO + "T00:00:00");
      const days = ["Вс","Пн","Вт","Ср","Чт","Пт","Сб"];
      return days[d.getDay()];
    }

    function hmToMin(hm){
      const m = /^(\d{1,2}):(\d{2})$/.exec(String(hm||"").trim());
      if(!m) return null;
      const h = Number(m[1]), mi = Number(m[2]);
      if(h<0||h>23||mi<0||mi>59) return null;
      return h*60+mi;
    }
    function minToHm(min){
      if(min===null || min===undefined) return "—";
      const h = Math.floor(min/60);
      const m = min%60;
      return String(h).padStart(2,"0")+":"+String(m).padStart(2,"0");
    }
    function colorHex(id){
      return (COLORS.find(c=>c.id===id)?.hex) || getCss("--pink");
    }

    function myId(){ return state.me?.tgUserId; }
    function otherId(){ return state.me?.otherUserId; }

    function toast(msg){
      state.error = msg;
      render();
      setTimeout(()=>{ state.error=null; render(); }, 2200);
    }

    function stopPolling(){
      if(state.pollTimer) clearInterval(state.pollTimer);
      state.pollTimer = null;
    }
    function startPolling(){
      stopPolling();
      state.pollTimer = setInterval(async ()=>{
        if(state.screen === "schedule" || state.screen === "profile"){
          await loadDay(false);
        }
      }, 4500);
    }

    async function loadMe(){
      try{
        const res = await apiFetch("/api/me");
        const data = await res.json();
        state.me = data;

        setPill(realPaired() ? "paired" : "need pairing");

        if(!realPaired()){
          state.screen = "pair";
          document.getElementById("tabs").classList.add("hidden");
          stopPolling();
        } else {
          document.getElementById("tabs").classList.remove("hidden");
          if(state.screen === "boot" || state.screen === "pair") state.screen = "schedule";
        }
      } catch(e){
        setPill("error");
        state.error = e.message;
      }
    }

    async function loadDay(resetSince=false){
      if(!realPaired()) return;

      try{
        const qs = new URLSearchParams({ date: state.date });
        if(!resetSince && state.since) qs.set("since", state.since);

        const res = await apiFetch("/api/day?"+qs.toString());
        const data = await res.json();
        if(!res.ok) throw new Error(data.error || "day_failed");

        if(!state.dayData || resetSince){
          state.dayData = data;
        } else {
          state.dayData.serverTime = data.serverTime;
          const map = new Map((state.dayData.events||[]).map(e=>[e.eventKey,e]));
          for(const e of (data.events||[])) map.set(e.eventKey, e);
          state.dayData.events = Array.from(map.values());

          state.dayData.notes = (state.dayData.notes||[]).concat(data.notes||[]);
          state.dayData.dayNotes = (state.dayData.dayNotes||[]).concat(data.dayNotes||[]);
          state.dayData.members = data.members || state.dayData.members;
        }
        state.since = data.serverTime;
      } catch(e){
        state.error = e.message;
      }

      if(state.screen === "schedule" || state.screen === "profile"){
        render();
      }
    }

    async function createPair(){
      state.error=null; state.lastPin=null;
      render();
      try{
        const res = await apiFetch("/api/space/create", { method:"POST", body:"{}" });
        const data = await res.json();
        if(!res.ok) throw new Error(data.error || "create_failed");
        state.lastPin = data.pin;
      }catch(e){ state.error = e.message; }
      render();
    }

    async function joinPair(pin){
      state.error=null;
      render();
      try{
        const res = await apiFetch("/api/space/join", {
          method:"POST",
          body: JSON.stringify({ pin })
        });
        const data = await res.json();
        if(!res.ok) throw new Error(data.error || "join_failed");

        await loadMe();
        if(realPaired()){
          await loadDay(true);
          startPolling();
        } else {
          toast("Похоже второй ещё не подключился.");
        }
      }catch(e){ state.error = e.message; }
      render();
    }

    async function leaveSpaceFrontend(){
      try{
        const res = await apiFetch("/api/space/leave", { method:"POST", body:"{}" });
        const data = await res.json();
        if(!res.ok) throw new Error(data.error || "leave_failed");
        toast("Ок: вышел из space");
        state.lastPin = null;
        state.dayData = null;
        state.since = null;
        await loadMe();
        render();
      }catch(e){
        toast("Ошибка: " + e.message);
      }
    }

    async function resetSpaceFrontend(){
      try{
        const res = await apiFetch("/api/space/reset", { method:"POST", body:"{}" });
        const data = await res.json();
        if(!res.ok) throw new Error(data.error || "reset_failed");
        toast("Ок: space сброшен");
        state.lastPin = null;
        state.dayData = null;
        state.since = null;
        await loadMe();
        render();
      }catch(e){
        toast("Ошибка: " + e.message);
      }
    }

    function copyText(text){
      if(!text) return;
      navigator.clipboard?.writeText(text);
      tg?.showPopup?.({ title:"Скопировано", message:text });
    }

    function eventsFor(userId){
      const all = state.dayData?.events || [];
      return all.filter(e => String(e.ownerTgUserId) === String(userId));
    }

    function makeTimeLabel(e){
      if(e.timeKind === "anytime") return "Anytime";
      const a = minToHm(e.startMin);
      const b = minToHm(e.endMin);
      return (e.timeKind === "approx" ? "~ " : "") + a + "–" + b;
    }

    function renderColumn(elId, userId, label){
      const el = document.getElementById(elId);
      const evs = eventsFor(userId);

      let html = `
        <div class="col">
          <div class="colhead">
            <div class="who">
              <div class="avatar">${escapeHtml(label.slice(0,1).toUpperCase())}</div>
              <div class="names">
                <div class="t">${escapeHtml(label)}</div>
                <small class="mono">${escapeHtml(String(userId || "—"))}</small>
              </div>
            </div>
            <span class="pill">${escapeHtml(String(evs.length))} events</span>
          </div>

          <div class="daywrap">
            <div class="daygrid">
      `;

      const labelHeight = 18;
      for(let h=0; h<=24; h++){
        const top = h*60;
        html += `<div class="hline" style="top:${top}px"></div>`;
        if(h<24){
          html += `<div class="hlabel" style="top:${top + 1 - labelHeight / 2}px">${escapeHtml(String(h).padStart(2,"0")+":00")}</div>`;
        }
      }

      for(const e of evs){
        let top = 10, height = 70, cls = "event any";
        if(e.timeKind !== "anytime"){
          const s = Number(e.startMin ?? 0);
          const en = Number(e.endMin ?? (s+60));
          top = Math.max(0, Math.min(1440, s));
          height = Math.max(18, Math.min(1440-top, en - s));
          cls = "event";
          if(e.timeKind === "approx") cls += " approx";
        }
        const col = colorHex(e.color);
        html += `
          <div class="${cls}" data-key="${escapeHtml(e.eventKey)}"
               style="top:${top}px; height:${height}px; background:${col}bb;">
            <div class="tt">${escapeHtml(e.title)}</div>
            <div class="ss">${escapeHtml(makeTimeLabel(e))}</div>
          </div>
        `;
      }

      html += `
            </div>

      const r = document.getElementById("fRecurrence")?.value;

      const cycle = document.getElementById("cycleBox");

      if(r === "none"){

    async function saveEvent(){
      const title = state.form.title.trim();
      const timeKind = state.form.timeKind;
      const recurrence = state.form.recurrence;

      if(!title){ toast("Название обязательно"); return; }

      let startMin=null, endMin=null;
      if(timeKind !== "anytime"){
        startMin = hmToMin(state.form.start);
        endMin = hmToMin(state.form.end);
        if(startMin===null || endMin===null){ toast("Время HH:MM"); return; }
        if(startMin >= endMin){ toast("Начало < конца"); return; }
      }

      const body = {
        title,
        color: state.form.color,
        timeKind,
        startMin,
        endMin,
        recurrenceKind: recurrence,
        singleDate: null,
        weeklyMask: null,
        cyclePattern: null,
        cycleAnchorDate: null
      };

      if(recurrence === "none"){
        const sd = state.form.singleDate.trim();
        if(!/^\d{4}-\d{2}-\d{2}$/.test(sd)){ toast("Дата YYYY-MM-DD"); return; }
        body.singleDate = sd;
      } else if(recurrence === "weekly"){
        if(state.weeklyMask === 0){ toast("Выбери дни"); return; }
        body.weeklyMask = state.weeklyMask;
      } else if(recurrence === "cycle"){
        const p = state.form.cyclePattern.trim();
        const a = state.form.cycleAnchor.trim();
        if(!/^[01]{2,31}$/.test(p)){ toast("Pattern 0/1 (2..31)"); return; }
        if(!/^\d{4}-\d{2}-\d{2}$/.test(a)){ toast("Anchor YYYY-MM-DD"); return; }
        body.cyclePattern = p;
        body.cycleAnchorDate = a;
      }

      try{
        const res = await apiFetch("/api/series", { method:"POST", body: JSON.stringify(body) });
        const data = await res.json();
        if(!res.ok) throw new Error(data.error || "save_failed");

        toast("Событие добавлено");
        state.screen = "schedule";
        setActiveTab("schedule");
        state.since = null;
        await loadDay(true);
      }catch(e){
        toast("Ошибка: "+e.message);
      }
    }

    async function saveDayNote(){

      if(!/^\d{4}-\d{2}-\d{2}$/.test(date)){ toast("Дата YYYY-MM-DD"); return; }

    async function safeDateNav(delta){
      if(state.actionLock) return;
      state.actionLock = true;
      try{
        state.date = addDays(state.date, delta);
        state.since = null;
        await loadDay(true);
      } finally {
        state.actionLock = false;
      }
    }
    async function safeSetDate(date){
      if(state.actionLock) return;
      if(!date) return;
      state.actionLock = true;
      try{
        state.date = date;
        state.since = null;
        await loadDay(true);
      } finally {
        state.actionLock = false;
      }
    }
    async function safeReloadDay(){
      if(state.actionLock) return;
      state.actionLock = true;
      try{
        state.since = null;
        await loadDay(true);
      } finally {
        state.actionLock = false;
      }
    }

    function escapeHtml(s) {
      return String(s)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

      if(realPaired()){
        await loadDay(true);
        startPolling();
      }
      render();
    }

    init();
  </script>
</body>
