<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Fitness Tracker</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root{
      --bg:#050507;
      --card:#0f0f14;
      --text:#b88cff;
      --muted:#8b74b9;
      --border:#2b1d42;
      --accent:#8b5cf6;
      --accent-soft:#6d28d9;
      --danger:#ef4444;
      --ok:#22c55e;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:Inter,system-ui,-apple-system,sans-serif;
    }
    .app{max-width:820px;margin:0 auto;padding:16px 14px 28px;}
    h1{margin:0 0 12px;font-size:26px}
    .subtitle{color:var(--muted);margin-bottom:12px}
    .tabs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
    button,input,select{font-size:16px}
    .tab,.btn{
      padding:10px 12px;border-radius:12px;border:1px solid var(--border);
      background:#1a1326;color:var(--text);font-weight:700;cursor:pointer;
    }
    .tab.active{background:linear-gradient(180deg,var(--accent),var(--accent-soft));color:#f5f3ff}
    .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:12px;margin-bottom:10px}
    .card h2{margin:0 0 10px;font-size:16px}
    .grid{display:grid;gap:8px}
    .grid.two{grid-template-columns:1fr 1fr}
    input,select{
      width:100%;padding:10px;border-radius:10px;border:1px solid var(--border);
      background:#120f1c;color:var(--text);
    }
    .row{display:flex;gap:8px;align-items:center}
    .btn{width:100%}
    .btn.secondary{background:#120f1c}
    .btn.danger{background:#3a1119;border-color:#6b1f2b;color:#ff9cab}
    .hidden{display:none}
    .small{font-size:13px;color:var(--muted)}
    .list{display:grid;gap:8px}
    .item{border:1px solid var(--border);border-radius:12px;padding:10px;background:#0b0a10}
    .itemTop{display:flex;justify-content:space-between;gap:8px;align-items:center}
    .muted{color:var(--muted)}
    .message{padding:10px;border-radius:10px;background:#1a1326;border:1px solid var(--border);margin-bottom:10px}
  </style>
</head>
<body>
  <div class="app">
    <h1>Трекер КБЖУ и тренировок</h1>
    <div class="subtitle">Оставлены только нужные модули: питание/вода и тренировки.</div>
    <div id="msg" class="message hidden"></div>
    <div class="tabs">
      <button id="tabNutrition" class="tab active">КБЖУ и вода</button>
      <button id="tabTraining" class="tab">Тренировки</button>
    </div>

    <section id="screenNutrition">
      <div class="card">
        <h2>Дата</h2>
        <input id="nutDate" type="date" />
      </div>
      <div class="card">
        <h2>Итоги за день</h2>
        <div id="totals" class="small">ккал: 0 · белки: 0 · жиры: 0 · углеводы: 0</div>
      </div>
      <div class="card">
        <h2>Вода и вес</h2>
        <div class="grid two">
          <div>
            <label class="small">Вес, кг</label>
            <input id="weight" placeholder="70" />
          </div>
          <div>
            <label class="small">Вода, мл</label>
            <input id="water" placeholder="2000" />
          </div>
        </div>
        <div class="row" style="margin-top:8px">
          <button id="saveWeight" class="btn secondary">Сохранить вес</button>
          <button id="saveWater" class="btn secondary">Сохранить воду</button>
        </div>
      </div>
      <div class="card">
        <h2>Добавить прием пищи</h2>
        <div class="grid">
          <select id="foodSelect"><option value="">Выбрать из продуктов</option></select>
          <input id="entryName" placeholder="Название (если без шаблона)" />
          <div class="grid two">
            <input id="grams" placeholder="Граммы" />
            <input id="kcal" placeholder="Ккал/100" />
            <input id="protein" placeholder="Белки/100" />
            <input id="fat" placeholder="Жиры/100" />
            <input id="carbs" placeholder="Углеводы/100" />
          </div>
          <button id="addEntry" class="btn">Добавить в дневник</button>
        </div>
      </div>
      <div class="card">
        <h2>Записи питания</h2>
        <div id="entries" class="list"></div>
      </div>
    </section>

    <section id="screenTraining" class="hidden">
      <div class="card">
        <h2>Дата тренировки</h2>
        <input id="trainDate" type="date" />
      </div>
      <div class="card">
        <h2>Добавить подход</h2>
        <div class="grid">
          <select id="exerciseSelect"><option value="">Новое упражнение</option></select>
          <input id="exerciseName" placeholder="Название упражнения" />
          <input id="exerciseCategory" placeholder="Категория" />
          <div class="grid two">
            <input id="setWeight" placeholder="Вес, кг" />
            <input id="setReps" placeholder="Повторы" />
          </div>
          <input id="setsCount" placeholder="Количество подходов" value="1" />
          <button id="addSet" class="btn">Сохранить тренировку</button>
        </div>
      </div>
      <div class="card">
        <h2>Тренировки за день</h2>
        <div id="workouts" class="list"></div>
      </div>
    </section>
  </div>

<script>
const tg = window.Telegram?.WebApp;
if (tg?.ready) tg.ready();
const today = new Date().toISOString().slice(0,10);

const state = { nutritionDate: today, trainingDate: today, foods: [] };

function msg(text){
  const el = document.getElementById('msg');
  el.textContent = text;
  el.classList.remove('hidden');
  setTimeout(()=>el.classList.add('hidden'), 2600);
}

async function api(path, options={}){
  const headers = { 'Content-Type':'application/json', ...(options.headers||{}) };
  const initData = tg?.initData || '';
  if (initData) headers['x-telegram-init-data'] = initData;
  const res = await fetch(path,{...options,headers});
  const data = await res.json().catch(()=>({}));
  if(!res.ok) throw new Error(data.error || 'request_failed');
  return data;
}

function num(v){ return Number(String(v||'').replace(',','.')); }

async function loadFoods(){
  const data = await api('/api/nutrition/foods');
  state.foods = data.foods || [];
  const sel = document.getElementById('foodSelect');
  sel.innerHTML = '<option value="">Выбрать из продуктов</option>' +
    state.foods.map(f=>`<option value="${f.id}">${f.name}</option>`).join('');
}

async function loadNutrition(){
  const [day,stats] = await Promise.all([
    api(`/api/nutrition/day?date=${state.nutritionDate}`),
    api(`/api/stats/day?date=${state.nutritionDate}`)
  ]);
  const t = day.totals || {kcal:0,protein:0,fat:0,carbs:0};
  document.getElementById('totals').textContent = `ккал: ${t.kcal.toFixed(1)} · белки: ${t.protein.toFixed(1)} · жиры: ${t.fat.toFixed(1)} · углеводы: ${t.carbs.toFixed(1)}`;
  document.getElementById('weight').value = stats.weightKg ?? '';
  document.getElementById('water').value = stats.waterMl ?? '';
  const list = document.getElementById('entries');
  list.innerHTML = (day.entries||[]).map(e=>`<div class="item"><div class="itemTop"><b>${e.name}</b><button class="btn danger" onclick="deleteEntry(${e.id})">Удалить</button></div><div class="small">${e.grams}г · ${e.kcal.toFixed(1)} ккал · Б ${e.protein.toFixed(1)} / Ж ${e.fat.toFixed(1)} / У ${e.carbs.toFixed(1)}</div></div>`).join('') || '<div class="small muted">Записей нет</div>';
}

async function deleteEntry(id){
  await api(`/api/nutrition/entry/${id}`,{method:'DELETE'});
  await loadNutrition();
}
window.deleteEntry = deleteEntry;

async function loadExercises(){
  const data = await api('/api/training/exercises');
  const sel = document.getElementById('exerciseSelect');
  sel.innerHTML = '<option value="">Новое упражнение</option>' + (data.exercises||[]).map(e=>`<option value="${e.id}">${e.name}</option>`).join('');
}

async function loadTraining(){
  const day = await api(`/api/training/day?date=${state.trainingDate}`);
  const list = document.getElementById('workouts');
  list.innerHTML = (day.items||[]).map(i=>`<div class="item"><b>${i.name}</b><div class="small muted">${(i.sets||[]).map(s=>`${s.weight}кг × ${s.reps}`).join(' · ')}</div></div>`).join('') || '<div class="small muted">Тренировок нет</div>';
}

async function addEntry(){
  const foodId = document.getElementById('foodSelect').value;
  const payload = { date: state.nutritionDate, grams: num(document.getElementById('grams').value) };
  if(foodId){ payload.foodId = Number(foodId); }
  else {
    Object.assign(payload,{ name: document.getElementById('entryName').value.trim(), kcal: num(document.getElementById('kcal').value), protein: num(document.getElementById('protein').value), fat: num(document.getElementById('fat').value), carbs: num(document.getElementById('carbs').value) });
  }
  await api('/api/nutrition/entry',{method:'POST', body: JSON.stringify(payload)});
  msg('Запись добавлена');
  await loadNutrition();
}

async function addSet(){
  let exId = Number(document.getElementById('exerciseSelect').value || 0);
  if(!exId){
    const exercise = await api('/api/training/exercise',{method:'POST', body: JSON.stringify({name: document.getElementById('exerciseName').value.trim(), category: document.getElementById('exerciseCategory').value.trim()})});
    exId = exercise.id;
    await loadExercises();
  }
  await api('/api/training/workout',{method:'POST', body: JSON.stringify({date: state.trainingDate, exerciseId: exId, weight: num(document.getElementById('setWeight').value), reps: num(document.getElementById('setReps').value), setsCount: Number(document.getElementById('setsCount').value || 1)})});
  msg('Тренировка сохранена');
  await loadTraining();
}

async function saveWeight(){
  await api('/api/stats/weight',{method:'PUT', body: JSON.stringify({date: state.nutritionDate, kg: num(document.getElementById('weight').value)})});
  msg('Вес сохранен');
}

async function saveWater(){
  await api('/api/stats/water',{method:'PUT', body: JSON.stringify({date: state.nutritionDate, ml: num(document.getElementById('water').value)})});
  msg('Вода сохранена');
}

function switchTab(tab){
  const isNut = tab === 'nutrition';
  document.getElementById('screenNutrition').classList.toggle('hidden', !isNut);
  document.getElementById('screenTraining').classList.toggle('hidden', isNut);
  document.getElementById('tabNutrition').classList.toggle('active', isNut);
  document.getElementById('tabTraining').classList.toggle('active', !isNut);
}

document.getElementById('tabNutrition').onclick = ()=>switchTab('nutrition');
document.getElementById('tabTraining').onclick = ()=>switchTab('training');
document.getElementById('nutDate').value = today;
document.getElementById('trainDate').value = today;
document.getElementById('nutDate').onchange = async (e)=>{state.nutritionDate=e.target.value; await loadNutrition();};
document.getElementById('trainDate').onchange = async (e)=>{state.trainingDate=e.target.value; await loadTraining();};
document.getElementById('addEntry').onclick = ()=>addEntry().catch(e=>msg(e.message));
document.getElementById('addSet').onclick = ()=>addSet().catch(e=>msg(e.message));
document.getElementById('saveWeight').onclick = ()=>saveWeight().catch(e=>msg(e.message));
document.getElementById('saveWater').onclick = ()=>saveWater().catch(e=>msg(e.message));

(async function init(){
  try{
    if(!tg?.initData) msg('Откройте приложение в Telegram для записи данных.');
    await Promise.all([loadFoods(), loadNutrition(), loadExercises(), loadTraining()]);
  }catch(e){
    msg(e.message || 'Ошибка загрузки');
  }
})();
</script>
</body>
</html>
